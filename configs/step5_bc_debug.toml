best_state_file = '/home/drixs2050/Documents/Mortal/artifacts/checkpoints/step5_bc_debug_best.pth'
batch_size = 128
train_log_every = 1
save_every = 20
val_steps = 10
max_steps = 40
top_k = 3
best_eval_split = 'val'
best_eval_every = 20
best_eval_batch_size = 0
best_eval_max_batches = 0

[bc.dataset]
