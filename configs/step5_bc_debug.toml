# Step 5 debug behavior-cloning profile.
# This is the fastest real-data sanity-check path for the BC trainer.
# It uses the stable Batch D Phoenix hanchan split so we can validate:
# - training and validation
# - checkpoint save/reload
# - held-out offline evaluation via `mortal/eval_bc.py`
#
# Once the merged Step 4B split is ready, the only required edit is usually:
# - `bc.dataset.train_list`
# - `bc.dataset.val_list`
# - `bc.dataset.test_list`

[resnet]
conv_channels = 64
num_blocks = 4

[bc.control]
version = 4
device = 'cuda:0'
enable_cudnn_benchmark = false
enable_amp = false
amp_dtype = 'bfloat16'
enable_tf32 = true
enable_compile = false
freeze_bn = false
tensorboard_dir = '/home/drixs2050/Documents/Mortal/artifacts/tensorboard/step5_bc_debug'
